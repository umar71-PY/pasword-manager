name: Build Android APK

on:
  push:
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4 
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install

    - name: Sync Capacitor Data
      run: npx cap sync android

    - name: Setup Java (Android SDK)
      uses: actions/setup-java@v4 
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Build APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK for Download
      uses: actions/upload-artifact@v4 # Updated to v4 (The Main Fix)
      with:
        name: SwitchWeek-App
        path: android/app/build/outputs/apk/debug/app-debug.apk