name: Build Android APK

on:
  push:
    branches: [ main ] # Agar teri branch ka naam 'master' hai toh isko master kar dena

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Sync Capacitor Data
      run: npx cap sync android

    - name: Setup Java (Android SDK)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK File
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK for Download
      uses: actions/upload-artifact@v3
      with:
        name: SwitchWeek-App
        path: android/app/build/outputs/apk/debug/app-debug.apk